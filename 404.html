<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>404 — layero-sample-html</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>Эта страница — кастомный <code>/404.html</code>.</p>
      <p>
        На Layero сегодня <strong>не отображается</strong> при заходе на
        несуществующий путь — edge nginx делает SPA-fallback на
        <code>/index.html</code>. Нужна поддержка <code>project_type: static</code>.
      </p>
      <p><a href="/">← На главную</a></p>
    </main>
  </body>
</html>
